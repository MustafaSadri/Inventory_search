<!DOCTYPE html>
<html>
<head>
  <title>Smart Inventory Search</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 10px;
      margin: 0;
      background: #f5f6fa;
    }

    h2 {
      color: #333;
      text-align: center;
      font-size: 20px;
    }

    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 2px solid #333;
      font-size: 16px;
    }

    .search-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 14px;
      width: 100%;
      border: 2px solid #333;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      padding: 12px;
      width: 100%;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      background: #333;
      color: white;
      font-size: 16px;
    }

    .suggestions {
      background: #fff;
      border-radius: 8px;
      margin-top: 5px;
      max-height: 200px;
      overflow-y: auto;
    }

    .suggestions div {
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }

    .suggestions div:hover {
      background: #f0f0f0;
    }
    .row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #eee;
  font-size: 15px;
}

.row:last-child {
  border-bottom: none;
}

.row span:first-child {
  font-weight: 600;
  color: #555;
}

.row span:last-child {
  font-weight: 500;
  color: #000;
}

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-top: 10px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    .loading { color: blue; text-align: center; }
    .error { color: red; }

    @media (min-width: 768px) {
      body {
        max-width: 600px;
        margin: auto;
      }

      .search-container {
        flex-direction: row;
      }

      input { width: 70%; }
      button { width: 30%; }
    }
  </style>
</head>

<body>

<h2>🔍Price List Search</h2>

<!-- ✅ SHEET SWITCH -->
<select id="sheetSelector">
  <option value="CARGO" selected>🚚 Cargo</option>
  <option value="CONTAINER">📦 Container</option>
</select>

<div class="search-container">
  <input type="text" id="searchBox" placeholder="Search item..." />
  <button onclick="fetchData()">🔄 Refresh</button>
</div>

<div id="loading" class="loading">⏳ Loading data...</div>
<div id="error" class="error"></div>
<div id="suggestions" class="suggestions"></div>
<div id="results"></div>

<script>
  // 🔥 PASTE YOUR NEW DEPLOYED URL HERE
  const BASE_URL = "https://script.google.com/macros/s/AKfycbzWZoAWyiQ3yP2z50-0TXUI6uxULosXjaawIADDDvtegq1voXfzmRiPpbVncRmGvmkQlg/exec";

  let data = [];
  let debounceTimer;

  async function fetchData(retries = 3) {
    const loadingEl = document.getElementById("loading");
    const errorEl = document.getElementById("error");
    const selectedSheet = document.getElementById("sheetSelector").value;

    try {
      loadingEl.innerText = `⏳ Loading ${selectedSheet} data...`;
      errorEl.innerText = "";

      const res = await fetch(
        BASE_URL + "?sheet=" + selectedSheet + "&t=" + new Date().getTime(),
        { cache: "no-store" }
      );

      if (!res.ok) throw new Error("HTTP error: " + res.status);

      const json = await res.json();

      if (!Array.isArray(json)) {
        throw new Error("Invalid data format");
      }

      data = json;
      loadingEl.innerText = `✅ ${selectedSheet} Data Loaded`;

    } catch (err) {
      if (retries > 0) {
        loadingEl.innerText = `🔄 Retrying... (${retries})`;
        setTimeout(() => fetchData(retries - 1), 1500);
      } else {
        loadingEl.innerText = "❌ Failed to load data";
        errorEl.innerText = err.message;
      }
    }
  }

  // auto load
  fetchData();
  setInterval(fetchData, 10000);

  // 🔥 change sheet
  document.getElementById("sheetSelector").addEventListener("change", () => {
    data = [];
    document.getElementById("results").innerHTML = "";
    document.getElementById("suggestions").innerHTML = "";
    fetchData();
  });

  document.getElementById("searchBox").addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(handleSearch, 300);
  });

  function getItemName(item) {
    return (
      item["ITEM NAME"] ||
      item["Item Name"] ||
      ""
    ).toLowerCase();
  }

  function highlight(text, query) {
    const regex = new RegExp(`(${query})`, "gi");
    return text.replace(regex, "<b style='color:blue'>$1</b>");
  }

  function handleSearch() {
    const query = document.getElementById("searchBox").value.toLowerCase();

    const suggestionsBox = document.getElementById("suggestions");
    const resultsBox = document.getElementById("results");

    suggestionsBox.innerHTML = "";
    resultsBox.innerHTML = "";

    if (!query) return;

    if (!data || data.length === 0) {
      document.getElementById("error").innerText = "⚠️ Data not ready yet";
      return;
    }

    const filtered = data.filter(item =>
      getItemName(item).includes(query)
    );

    if (filtered.length === 0) {
      resultsBox.innerHTML = `❌ No items found`;
      return;
    }

    filtered.slice(0, 5).forEach(item => {
      const div = document.createElement("div");
      div.innerHTML = highlight(item["ITEM NAME"] || "Unknown", query);
      div.onclick = () => selectItem(item);
      suggestionsBox.appendChild(div);
    });

    filtered.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

     card.innerHTML = `
  <div class="card">
    <strong style="font-size:18px;">${item["ITEM NAME"] || "-"}</strong>

    <div class="row"><span>₽ Rate</span><span>${item["RATE"] || "-"}</span></div>
    <div class="row"><span>💵 Dollar</span><span>${item["DOLLAR"] || "-"}</span></div>
    <div class="row"><span>¥ RMB</span><span>${item["RMB"] || "-"}</span></div>
    <div class="row"><span>📅 Date</span><span>${item["DATE UPDATED"] || "-"}</span></div>
  </div>
`;
      resultsBox.appendChild(card);
    });
  }

  function selectItem(item) {
  document.getElementById("searchBox").value = item["ITEM NAME"];
  document.getElementById("suggestions").innerHTML = "";

  document.getElementById("results").innerHTML = `
    <div class="card">
      <strong style="font-size:18px;">${item["ITEM NAME"] || "-"}</strong>

      <div class="row">
        <span>₽ Rate</span>
        <span>${item["RATE"] || "-"}</span>
      </div>

      <div class="row">
        <span>💵 Dollar</span>
        <span>${item["DOLLAR"] || "-"}</span>
      </div>

      <div class="row">
        <span>¥ RMB</span>
        <span>${item["RMB"] || "-"}</span>
      </div>

      <div class="row">
        <span>📅 Date</span>
        <span>${item["DATE UPDATED"] || item["DATE"] || "-"}</span>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
