<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwraLzyh0kW-7gmHjWCgeAbyVCX4HqihytVMi2YWHjXDlbUI50TUvAktYqNp7lwkz-VZQ/exec";

  let data = [];
  let debounceTimer;

  // ✅ FETCH (NO PROXY, DIRECT, STABLE)
  async function fetchData(retries = 3) {
    const loadingEl = document.getElementById("loading");
    const errorEl = document.getElementById("error");

    try {
      loadingEl.innerText = "⏳ Loading data...";
      errorEl.innerText = "";

      const res = await fetch(API_URL + "?t=" + new Date().getTime(), {
        cache: "no-store"
      });

      if (!res.ok) throw new Error("HTTP error: " + res.status);

      const json = await res.json();

      if (!Array.isArray(json)) {
        throw new Error("Data is not array");
      }

      data = json;

      console.log("✅ Fresh Data Loaded:", data);
      loadingEl.innerText = "✅ Data Loaded";

    } catch (err) {
      console.error("Fetch error:", err);

      if (retries > 0) {
        loadingEl.innerText = `🔄 Retrying... (${retries})`;
        setTimeout(() => fetchData(retries - 1), 1500);
      } else {
        loadingEl.innerText = "❌ Failed to load data";
        errorEl.innerText = "Error: " + err.message;
      }
    }
  }

  fetchData();

  // 🔄 Auto refresh
  setInterval(fetchData, 10000);

  // ✅ Debounce Search
  document.getElementById("searchBox").addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(handleSearch, 300);
  });

  function getItemName(item) {
    return (
      item["ITEM NAME"] ||
      item["Item Name"] ||
      ""
    ).toLowerCase();
  }

  function highlight(text, query) {
    const regex = new RegExp(`(${query})`, "gi");
    return text.replace(regex, "<b style='color:blue'>$1</b>");
  }

  function handleSearch() {
    const query = document.getElementById("searchBox").value.toLowerCase();

    const suggestionsBox = document.getElementById("suggestions");
    const resultsBox = document.getElementById("results");

    suggestionsBox.innerHTML = "";
    resultsBox.innerHTML = "";

    if (!query) return;

    if (!data || data.length === 0) {
      document.getElementById("error").innerText = "⚠️ Data not ready yet";
      return;
    }

    resultsBox.innerHTML = "⏳ Searching...";

    const filtered = data.filter(item =>
      getItemName(item).includes(query)
    );

    if (filtered.length === 0) {
      resultsBox.innerHTML = `
        <div style="color:red;">❌ No items found for "${query}"</div>
      `;
      return;
    }

    // Suggestions
    filtered.slice(0, 5).forEach(item => {
      const div = document.createElement("div");
      div.innerHTML = highlight(item["ITEM NAME"] || "Unknown", query);
      div.onclick = () => selectItem(item);
      suggestionsBox.appendChild(div);
    });

    // Results
    resultsBox.innerHTML = "";

    filtered.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <strong>${item["ITEM NAME"] || "-"}</strong><br><br>
        💰 RATE: ${item["RATE"] || "-"}<br>
        💵 DOLLAR: ${item["DOLLAR"] || "-"}<br>
        🇨🇳 RMB: ${item["RMB"] || "-"}<br>
        📅 DATE: ${item["DATE UPDATED"] || "-"}
      `;

      resultsBox.appendChild(card);
    });
  }

  function selectItem(item) {
    document.getElementById("searchBox").value = item["ITEM NAME"];
    document.getElementById("suggestions").innerHTML = "";

    const resultsBox = document.getElementById("results");

    resultsBox.innerHTML = `
      <div class="card">
        <strong>${item["ITEM NAME"] || "-"}</strong><br><br>
        💰 RATE: ${item["RATE"] || "-"}<br>
        💵 DOLLAR: ${item["DOLLAR"] || "-"}<br>
        🇨🇳 RMB: ${item["RMB"] || "-"}<br>
        📅 DATE: ${item["DATE UPDATED"] || "-"}
      </div>
    `;
  }
</script>
