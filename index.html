<!DOCTYPE html>
<html>
<head>
  <title>Smart Inventory Search</title>

  <!-- ✅ Mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 10px;
      margin: 0;
      background: #f5f6fa;
    }

    h2 {
      color: #333;
      text-align: center;
      font-size: 20px;
    }

    /* 🔍 Search container */
    .search-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 14px;
      width: 100%;
      border: 2px solid #333;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 12px;
      width: 100%;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      background: #333;
      color: white;
      font-size: 16px;
    }

    /* Suggestions */
    .suggestions {
      width: 100%;
      background: #fff;
      border-radius: 8px;
      margin-top: 5px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      max-height: 200px;
      overflow-y: auto;
    }

    .suggestions div {
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }

    .suggestions div:hover {
      background: #f0f0f0;
    }

    /* Cards */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-top: 10px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
      font-size: 14px;
      line-height: 1.5;
    }

    .card strong {
      font-size: 16px;
      display: block;
      margin-bottom: 5px;
    }

    .error { color: red; margin-top: 10px; }
    .loading { color: blue; margin-top: 10px; text-align: center; }

    /* 💻 Desktop optimization */
    @media (min-width: 768px) {
      body {
        max-width: 600px;
        margin: auto;
      }

      .search-container {
        flex-direction: row;
      }

      input {
        width: 70%;
      }

      button {
        width: 30%;
      }
    }
  </style>
</head>

<body>

<h2>🔍 Smart Inventory Search</h2>

<div class="search-container">
  <input type="text" id="searchBox" placeholder="Search item..." />
  <button onclick="fetchData()">🔄 Refresh</button>
</div>

<div id="loading" class="loading">⏳ Loading data...</div>
<div id="error" class="error"></div>
<div id="suggestions" class="suggestions"></div>
<div id="results"></div>

<!-- ✅ JS UNCHANGED -->
<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwraLzyh0kW-7gmHjWCgeAbyVCX4HqihytVMi2YWHjXDlbUI50TUvAktYqNp7lwkz-VZQ/exec";

  let data = [];
  let debounceTimer;

  async function fetchData(retries = 3) {
    const loadingEl = document.getElementById("loading");
    const errorEl = document.getElementById("error");

    try {
      loadingEl.innerText = "⏳ Loading data...";
      errorEl.innerText = "";

      const res = await fetch(API_URL + "?t=" + new Date().getTime(), {
        cache: "no-store"
      });

      if (!res.ok) throw new Error("HTTP error: " + res.status);

      const json = await res.json();

      if (!Array.isArray(json)) {
        throw new Error("Data is not array");
      }

      data = json;

      console.log("✅ Fresh Data Loaded:", data);
      loadingEl.innerText = "✅ Data Loaded";

    } catch (err) {
      console.error("Fetch error:", err);

      if (retries > 0) {
        loadingEl.innerText = `🔄 Retrying... (${retries})`;
        setTimeout(() => fetchData(retries - 1), 1500);
      } else {
        loadingEl.innerText = "❌ Failed to load data";
        errorEl.innerText = "Error: " + err.message;
      }
    }
  }

  fetchData();
  setInterval(fetchData, 10000);

  document.getElementById("searchBox").addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(handleSearch, 300);
  });

  function getItemName(item) {
    return (
      item["ITEM NAME"] ||
      item["Item Name"] ||
      ""
    ).toLowerCase();
  }

  function highlight(text, query) {
    const regex = new RegExp(`(${query})`, "gi");
    return text.replace(regex, "<b style='color:blue'>$1</b>");
  }

  function handleSearch() {
    const query = document.getElementById("searchBox").value.toLowerCase();

    const suggestionsBox = document.getElementById("suggestions");
    const resultsBox = document.getElementById("results");

    suggestionsBox.innerHTML = "";
    resultsBox.innerHTML = "";

    if (!query) return;

    if (!data || data.length === 0) {
      document.getElementById("error").innerText = "⚠️ Data not ready yet";
      return;
    }

    resultsBox.innerHTML = "⏳ Searching...";

    const filtered = data.filter(item =>
      getItemName(item).includes(query)
    );

    if (filtered.length === 0) {
      resultsBox.innerHTML = `
        <div style="color:red;">❌ No items found for "${query}"</div>
      `;
      return;
    }

    filtered.slice(0, 5).forEach(item => {
      const div = document.createElement("div");
      div.innerHTML = highlight(item["ITEM NAME"] || "Unknown", query);
      div.onclick = () => selectItem(item);
      suggestionsBox.appendChild(div);
    });

    resultsBox.innerHTML = "";

    filtered.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <strong>${item["ITEM NAME"] || "-"}</strong><br><br>
        💰 RATE: ${item["RATE"] || "-"}<br>
        💵 DOLLAR: ${item["DOLLAR"] || "-"}<br>
        🇨🇳 RMB: ${item["RMB"] || "-"}<br>
        📅 DATE: ${item["DATE UPDATED"] || "-"}
      `;

      resultsBox.appendChild(card);
    });
  }

  function selectItem(item) {
    document.getElementById("searchBox").value = item["ITEM NAME"];
    document.getElementById("suggestions").innerHTML = "";

    const resultsBox = document.getElementById("results");

    resultsBox.innerHTML = `
      <div class="card">
        <strong>${item["ITEM NAME"] || "-"}</strong><br><br>
        💰 RATE: ${item["RATE"] || "-"}<br>
        💵 DOLLAR: ${item["DOLLAR"] || "-"}<br>
        🇨🇳 RMB: ${item["RMB"] || "-"}<br>
        📅 DATE: ${item["DATE UPDATED"] || "-"}
      </div>
    `;
  }
</script>

</body>
</html>
