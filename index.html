<!DOCTYPE html>
<html>
<head>
  <title>Inventory Search</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 300px;
    }

    .suggestions {
      border: 1px solid #ccc;
      max-width: 300px;
      cursor: pointer;
    }

    .suggestions div {
      padding: 8px;
    }

    .suggestions div:hover {
      background: #f0f0f0;
    }

    .card {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>🔍 Search Inventory</h2>

<input type="text" id="searchBox" placeholder="Search item..." onkeyup="handleSearch()" />

<div id="suggestions" class="suggestions"></div>

<div id="results"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxy3YRCi0Zw-1z5joUIXY-SuoPbl0Izp24IkvoG3Ui7zE2UPPNZXrlZTGVU4fv_2SI5ag/exec"; // paste your URL

  let data = [];

  // Fetch data
  async function fetchData() {
    const res = await fetch(API_URL);
    data = await res.json();
  }

  fetchData();

  function handleSearch() {
    const query = document.getElementById("searchBox").value.toLowerCase();

    const suggestionsBox = document.getElementById("suggestions");
    const resultsBox = document.getElementById("results");

    suggestionsBox.innerHTML = "";
    resultsBox.innerHTML = "";

    if (!query) return;

    // Filter data
    const filtered = data.filter(item =>
      item["ITEM NAME"]?.toLowerCase().includes(query)
    );

    // Show suggestions (top 5)
    filtered.slice(0, 5).forEach(item => {
      const div = document.createElement("div");
      div.innerText = item["ITEM NAME"];
      div.onclick = () => selectItem(item);
      suggestionsBox.appendChild(div);
    });

    // Show full results
    filtered.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <strong>${item["ITEM NAME"]}</strong><br>
        RATE: ${item["RATE"] || "-"}<br>
        DOLLAR: ${item["DOLLAR"] || "-"}<br>
        RMB: ${item["RMB"] || "-"}<br>
        DATE: ${item["DATE UPDATED"] || "-"}
      `;

      resultsBox.appendChild(card);
    });
  }

  function selectItem(item) {
    document.getElementById("searchBox").value = item["ITEM NAME"];
    document.getElementById("suggestions").innerHTML = "";

    const resultsBox = document.getElementById("results");
    resultsBox.innerHTML = `
      <div class="card">
        <strong>${item["ITEM NAME"]}</strong><br>
        RATE: ${item["RATE"] || "-"}<br>
        DOLLAR: ${item["DOLLAR"] || "-"}<br>
        RMB: ${item["RMB"] || "-"}<br>
        DATE: ${item["DATE UPDATED"] || "-"}
      </div>
    `;
  }
</script>

</body>
</html>
